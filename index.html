<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neonowy Kalkulator Kalorii</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --bg-color: #050505;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            box-sizing: border-box;
        }

        h1 {
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-blue);
            animation: pulse 1.5s infinite alternate;
            margin-bottom: 10px;
            font-size: 1.5rem;
            text-align: center;
        }

        @keyframes pulse {
            from { opacity: 0.7; text-shadow: 0 0 5px var(--neon-blue); }
            to { opacity: 1; text-shadow: 0 0 20px var(--neon-blue); }
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 350px;
        }

        input {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: white;
            padding: 8px;
            border-radius: 5px;
            box-shadow: 0 0 5px var(--neon-blue);
            outline: none;
            width: 100%;
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        button {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
            text-shadow: 0 0 5px var(--neon-blue);
            box-shadow: 0 0 5px var(--neon-blue);
            font-weight: bold;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--neon-blue);
            color: black;
        }

        .total-card {
            border: 2px solid var(--neon-blue);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 0 15px var(--neon-blue);
            margin: 10px 0;
            background: rgba(0, 242, 255, 0.05);
        }

        #totalKcal {
            font-size: 2rem;
            display: block;
            margin-top: 5px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        #mealList {
            border: 1px solid var(--neon-blue);
            padding: 10px;
            border-radius: 5px;
            height: 120px;
            overflow-y: auto;
            box-shadow: inset 0 0 5px var(--neon-blue);
            font-size: 0.85rem;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            padding-bottom: 2px;
        }

        .btn-reset {
            border-radius: 50%;
            width: 40px;
            height: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>Kalkulator Posiłku</h1>
    
    <button class="btn-reset" onclick="resetMeal()">O</button>

    <div class="container">
        <input type="text" id="prodName" placeholder="Nazwa produktu (np. Ryż)">
        <div style="display: flex; gap: 5px;">
            <input type="number" id="prodKcal" placeholder="kcal / 100g">
            <input type="number" id="prodWeight" placeholder="Waga (g)">
        </div>
        <button onclick="addIngredient()">Dodaj do posiłku</button>

        <div class="total-card">
            SUMA POSIŁKU:
            <span id="totalKcal">0 kcal</span>
        </div>

        <div id="mealList">
            <!-- Składniki pojawią się tutaj -->
        </div>
    </div>

    <script>
        let totalCalories = 0;

        function addIngredient() {
            const name = document.getElementById('prodName').value || "Produkt";
            const kcalPer100 = parseFloat(document.getElementById('prodKcal').value);
            const weight = parseFloat(document.getElementById('prodWeight').value);

            if (kcalPer100 >= 0 && weight > 0) {
                const result = Math.round((kcalPer100 / 100) * weight);
                totalCalories += result;

                // Dodaj do listy wizualnej
                const list = document.getElementById('mealList');
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `<span>${name} (${weight}g)</span> <span>${result} kcal</span>`;
                list.prepend(item);

                // Aktualizuj sumę
                document.getElementById('totalKcal').innerText = totalCalories + " kcal";

                // Wyczyść pola
                document.getElementById('prodName').value = '';
                document.getElementById('prodKcal').value = '';
                document.getElementById('prodWeight').value = '';
            } else {
                alert("Wpisz poprawne liczby!");
            }
        }

        function resetMeal() {
            totalCalories = 0;
            document.getElementById('totalKcal').innerText = "0 kcal";
            document.getElementById('mealList').innerHTML = "";
        }
    </script>
</body>
</html>
